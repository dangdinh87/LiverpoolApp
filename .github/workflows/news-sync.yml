name: Hourly News Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger /api/news/sync
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SYNC_URL }}" \
            --max-time 300 \
            --retry 3 \
            --retry-delay 10 \
            --retry-connrefused \
            --fail \
            --show-error \
            --silent

      - name: Log success
        if: success()
        run: echo "News sync completed at $(date -u)"
