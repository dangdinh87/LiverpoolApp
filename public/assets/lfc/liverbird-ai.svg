<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Liver Bird silhouette inspired by Liverpool's iconic symbol -->
  <defs>
    <linearGradient id="bird-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="60%" stop-color="#E8333E"/>
      <stop offset="100%" stop-color="#F6EB61"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Body -->
    <path d="M32 58c-1 0-2.5-2-3-4l-2-8c-.5-2-.5-4 0-6l2-6c.5-1.5 1-3 1-4.5V24c0-2-.5-3.5-1.5-5L26 16c-1-1.5-1.5-3-1-4.5.5-1.5 2-2.5 3.5-2.5h7c1.5 0 3 1 3.5 2.5s0 3-1 4.5l-2.5 3c-1 1.5-1.5 3-1.5 5v5.5c0 1.5.5 3 1 4.5l2 6c.5 2 .5 4 0 6l-2 8c-.5 2-2 4-3 4z" fill="url(#bird-grad)"/>
    <!-- Left wing -->
    <path d="M29 24c-2 1-5 2-8 2-3 0-6-.5-8-2-2-1.5-3-3.5-2-5.5 1-2 3-3 5.5-3 2 0 4 .5 5.5 1.5l4 3.5c1 1 2 2 3 3.5z" fill="url(#bird-grad)" opacity="0.9"/>
    <!-- Right wing -->
    <path d="M35 24c2 1 5 2 8 2 3 0 6-.5 8-2 2-1.5 3-3.5 2-5.5-1-2-3-3-5.5-3-2 0-4 .5-5.5 1.5l-4 3.5c-1 1-2 2-3 3.5z" fill="url(#bird-grad)" opacity="0.9"/>
    <!-- Head crest -->
    <path d="M30 10c0-2 .5-4 2-6 1.5 2 2 4 2 6 0 1-.5 2-1 2.5l-1 .5-1-.5c-.5-.5-1-1.5-1-2.5z" fill="url(#bird-grad)"/>
    <!-- Beak -->
    <path d="M30.5 14l1.5-2 1.5 2c-.5.5-1 .8-1.5.8s-1-.3-1.5-.8z" fill="#F6EB61"/>
    <!-- Eye -->
    <circle cx="31" cy="12" r="0.8" fill="#0D0D0D"/>
    <circle cx="33" cy="12" r="0.8" fill="#0D0D0D"/>
    <!-- Tail feathers -->
    <path d="M30 50c-1 2-2 4-4 5.5 1-2 1.5-4 1.5-6l.5-3 2 3.5zM34 50c1 2 2 4 4 5.5-1-2-1.5-4-1.5-6l-.5-3-2 3.5z" fill="url(#bird-grad)" opacity="0.7"/>
    <!-- Feet/talons -->
    <path d="M29 56l-2 4m0 0l-1.5-1m1.5 1l1.5-1M35 56l2 4m0 0l1.5-1m-1.5 1l-1.5-1" stroke="url(#bird-grad)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Sparkle/AI accent dots -->
    <circle cx="18" cy="14" r="1" fill="#F6EB61" opacity="0.6"/>
    <circle cx="46" cy="14" r="1" fill="#F6EB61" opacity="0.6"/>
    <circle cx="32" cy="3" r="0.8" fill="#F6EB61" opacity="0.8"/>
  </g>
</svg>
